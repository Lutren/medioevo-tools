<!DOCTYPE html><html lang='es-MX'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Compra exitosa — MEDIOEVO Tools</title><style>:root{--bg:#0a0c0e;--bg2:#12161a;--bg3:#1a2030;--border:#2a3040;--brass:#e8c074;--cyan:#24e8ff;--green:#7fe3b0;--text:#c8cdd6;--dim:#6a7280;--font:ui-monospace,'Courier New',monospace;--r:4px}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}.container{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:40px;max-width:480px;width:100%;text-align:center}.icon{font-size:4rem;margin-bottom:16px}h1{color:var(--brass);font-size:1.5rem;margin-bottom:12px}p{color:var(--dim);line-height:1.6;margin-bottom:20px}.code{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:12px;margin:16px 0;font-family:var(--font);font-size:.85rem;color:var(--green);word-break:break-all}.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--brass);border:none;border-radius:4px;color:#0a0c0e;font-family:var(--font);font-weight:700;text-decoration:none;transition:transform .15s,box-shadow .15s}.btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(232,192,116,.4)}.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.note{font-size:.75rem;color:var(--dim);margin-top:24px}</style></head><body><div class='container'><div class='icon'>✓</div><h1>¡Compra completada!</h1><p>Tu pago se ha procesado correctamente. Recibirás tu clave de licencia por email en los próximos minutos.</p><div class='code' id='licenseKey'>Cargando clave...</div><p class='note'>Guarda esta clave. También se ha enviado a tu email.</p><a href='https://lutren.github.io/medioevo-tools/anti_ia_detector_web.html' class='btn secondary'>Volver al detector</a></div><script>async function checkLicense(){const urlParams=new URLSearchParams(window.location.search);const sessionId=urlParams.get('session_id');if(sessionId){try{const res=await fetch('/api/license-by-session/'+sessionId);if(res.ok){const data=await res.json();document.getElementById('licenseKey').textContent=data.license_key||'Clave pendiente...';}else{document.getElementById('licenseKey').textContent='Clave pendiente - revisa tu email';}}catch(e){document.getElementById('licenseKey').textContent='Clave pendiente - revisa tu email';}}else{document.getElementById('licenseKey').textContent='Sesión no encontrada - revisa tu email';}}checkLicense();</script></body></html>
