kind = "web"
previewPath = "/duat-city/"
title = "DUAT Agent City"
version = "1.0.0"
id = "artifacts/duat-city"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/duat-city/" ]
localPort = 18519

[services.development]
run = "pnpm --filter @workspace/duat-city run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/duat-city", "run", "build" ]
publicDir = "artifacts/duat-city/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18519"
BASE_PATH = "/duat-city/"
